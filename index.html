note" you probably associate with the smell — vaporizes around 167°C. It sets the tone for everything that follows.`,tag:`science`},{id:3,emoji:`💛`,text:`Limonene vaporizes around 176°C. It's the reason your first bag at a low temp can taste surprisingly citrusy and bright.`,tag:`science`},{id:4,emoji:`🌸`,text:`Linalool — the terpene that makes lavender smell like lavender — shows up in many cultivars and vaporizes around 198°C. Higher temps unlock it.`,tag:`science`},{id:5,emoji:`🫧`,text:`The Volcano uses convection: hot air moves through the material rather than heating it by contact. It's why vapor tastes cleaner than most other devices.`,tag:`science`},{id:6,emoji:`🧬`,text:`THC vaporizes starting around 157°C. CBD requires slightly higher — around 160–180°C. Temperature affects more than just density.`,tag:`science`},{id:7,emoji:`🌊`,text:`Pinene — piney, sharp, that forest-floor smell — vaporizes around 155°C. It's most noticeable in the very first bag at a low setting.`,tag:`science`},{id:8,emoji:`🔭`,text:`Terpinolene is one of the rarest primary terpenes. Found in high concentrations in some sativa-leaning cultivars, it vaporizes around 186°C.`,tag:`science`},{id:9,emoji:`🐝`,text:`Humulene — earthy, woody, hops-like — technically starts vaporizing around 106°C. It accumulates in background notes throughout a session.`,tag:`science`},{id:10,emoji:`🌺`,text:`Ocimene, a sweet herbaceous terpene, vaporizes around 66°C. Which means you've been smelling it before you even start the session.`,tag:`science`},{id:11,emoji:`🌿`,text:`Beta-caryophyllene (spicy, peppery) is the only terpene known to directly bind to CB2 receptors. It vaporizes around 130°C. Even low-temp bags carry it.`,tag:`science`},{id:12,emoji:`🌙`,text:`Terpenes degrade faster under light and heat than cannabinoids do. Properly cured, dark-stored material almost always performs better across every temperature range.`,tag:`science`},{id:13,emoji:`🌀`,text:`CBN forms when THC oxidizes — it's essentially aged THC. It vaporizes around 185°C and is associated with sedating effects. Higher in older or improperly stored material.`,tag:`science`},{id:14,emoji:`🌵`,text:`In dry climates, material loses moisture faster, which can make vapor feel harsher at higher temperatures. A humidity pack in storage makes a noticeable quality difference.`,tag:`science`},{id:15,emoji:`🌸`,text:`Phytol, found in chlorophyll-rich material, vaporizes around 204°C. It contributes to the slightly green or grassy notes in higher-temp bags from less-cured flower.`,tag:`science`},{id:16,emoji:`🏔️`,text:`At high altitude, lower air pressure slightly shifts boiling points. Lower-temp bags can be marginally more efficient at elevation. The mountain has a say.`,tag:`science`},{id:17,emoji:`🧬`,text:`THCV vaporizes at around 220°C — higher than THC. It's associated with clear-headed, energetic effects and exists in trace amounts in most cultivars.`,tag:`science`},{id:18,emoji:`🎓`,text:`Boiling points are measured in pure compound form. In actual plant material, behavior shifts slightly due to water content and terpene interactions. The dial is a guide, not a formula.`,tag:`science`},{id:19,emoji:`📡`,text:`Science calls low-temp terpene preservation "fraction-specific vaporization." We call it "wait — why does dial 5 taste completely different than dial 7?"`,tag:`science`},{id:20,emoji:`🫁`,text:`A slow 5–7 second draw is more efficient than a fast puff. The lungs absorb vapor more completely at lower inhalation speeds. Patience is a feature, not a flaw.`,tag:`science`},{id:21,emoji:`🎯`,text:`Fine-ground material vaporizes more evenly than coarse. More surface area, more even airflow. But too fine and you restrict the airflow entirely. Medium-coarse is the optimization.`,tag:`science`},{id:22,emoji:`🔋`,text:`Leaving the Volcano on between bags is fine — it's designed for sustained heating. Turning it on and off repeatedly stresses the heating element more than leaving it steady.`,tag:`science`},{id:23,emoji:`🧊`,text:`Resting a filled bag on a cool surface for 30 seconds before inhaling slightly improves smoothness. Vapor cools, compounds settle, you notice the difference.`,tag:`science`},{id:24,emoji:`🎚️`,text:`Terpene profiles can vary significantly between the same strain grown in different conditions. Soil quality, light spectrum, and cure time all affect what you're vaporizing.`,tag:`science`},{id:25,emoji:`⚗️`,text:`The fill chamber screen is the most underrated maintenance item. A partially clogged screen mimics a weak unit — but it's a three-dollar fix.`,tag:`science`},{id:26,emoji:`🌱`,text:`Water content in material affects vaporization. Too dry and it burns faster. Too moist and the unit works harder to reach temperature. There is a sweet spot in the flower itself.`,tag:`science`},{id:27,emoji:`🧪`,text:`Terpene oxidation happens when material is exposed to air, light, or heat after harvest. Every day in sub-optimal storage is a flavor day lost.`,tag:`science`},{id:28,emoji:`🔍`,text:`The golden-orange hue that develops inside bags over time is terpene and cannabinoid residue — not contamination. Cleanable with ISO. Proof the device is working.`,tag:`science`},{id:29,emoji:`🌬️`,text:`Vapor sitting in a bag degrades over time as terpenes condense on the bag walls. Optimal freshness: within 5–10 minutes of filling.`,tag:`science`},{id:30,emoji:`📦`,text:`A properly filled Easy Valve bag holds about 0.5L of vapor. A full inhale from human lungs is roughly 0.5–1L. The math works out exactly how you'd hope.`,tag:`science`},{id:31,emoji:`🌡️`,text:`The Hybrid's Superboost can reach 230°C. Most compounds aren't active at that temperature. It's for complete material extraction, not for flavor.`,tag:`science`},{id:32,emoji:`🔬`,text:`Convection heating produces a purer vapor profile because there's no combustion — the material is never burned, only exhausted of its volatile compounds.`,tag:`science`},{id:33,emoji:`🧲`,text:`ISO alcohol (99%) evaporates faster and leaves less residue than 91%. Always rinse components thoroughly with water after ISO cleaning. This is the protocol.`,tag:`science`},{id:34,emoji:`💡`,text:`Already-vaped material (ABV) is already decarboxylated by heat. It's less potent than fresh material, but it's not spent — it's just been reassigned.`,tag:`science`},{id:35,emoji:`🧠`,text:`The entourage effect is the hypothesis that cannabinoids and terpenes work together — which is one reason whole-flower vaporization produces a different experience than isolates.`,tag:`science`},{id:36,emoji:`🌊`,text:`Humidity levels in the 55–65% RH range are generally considered ideal for flower storage. Below that, terpenes evaporate. Above that, you risk degradation of a different kind.`,tag:`science`},{id:37,emoji:`🔭`,text:`There are more identified terpene compounds in cannabis than most other botanicals studied. The full flavor and effect map across temperatures hasn't been fully charted.`,tag:`science`},{id:38,emoji:`⚡`,text:`Hot air from the Volcano's fan passes through the material in under a second per cycle. Vapor generation is nearly instantaneous once the chamber is saturated.`,tag:`science`},{id:39,emoji:`🌿`,text:`A single Filling Chamber holds 0.1–0.3g comfortably. Overfilling doesn't increase yield — it decreases airflow, which decreases vapor quality.`,tag:`science`},{id:40,emoji:`🌡️`,text:`The first bag from a freshly loaded chamber often runs slightly cooler than subsequent bags, because the material absorbs initial heat. Bag 2 tends to be more consistent.`,tag:`science`},{id:41,emoji:`🧬`,text:`CBC (cannabichromene) vaporizes around 220°C. It's non-psychoactive but present in most cultivars. High-temp sessions are the only way to encounter it.`,tag:`science`},{id:42,emoji:`🌺`,text:`Geraniol — floral, rose-like — vaporizes around 230°C. You'd only encounter it in a superboost session, which is also where subtlety goes to retire.`,tag:`science`},{id:43,emoji:`📏`,text:`The Solid Valve can be cut to virtually any bag length. There is no official maximum. Someone, somewhere, has definitely made a bag longer than they should have.`,tag:`science`},{id:44,emoji:`🔮`,text:`The vapor you exhale after holding a hit for 2–3 seconds contains significantly fewer compounds than what you inhaled. Holding in draws out more vapor per bag.`,tag:`science`},{id:45,emoji:`🧊`,text:`Cooling the vapor path — through a water attachment or secondary filtering — lowers temperature without meaningfully reducing compound delivery. Smoother same-efficiency vapor.`,tag:`science`},{id:46,emoji:`🎯`,text:`Moisture content in flower of 8–12% is generally optimal for vaporization. Below 6% and the material combusts more easily at high temps.`,tag:`science`},{id:47,emoji:`🌙`,text:`CBG vaporizes around 52°C — one of the lowest of all cannabinoids. Technically, trace CBG is in the first few seconds of any session, even before you'd notice anything.`,tag:`science`},{id:48,emoji:`⚗️`,text:`Terpene isolation studies suggest that flavor perception of the same terpene can differ based on concentration. Low doses register as pleasant. High doses can register as harsh.`,tag:`science`},{id:49,emoji:`🔬`,text:`Most studies on vaporizer efficiency find that convection vaporizers extract 80–95% of available compounds before material shows signs of combustion. The Volcano benchmarks at the high end.`,tag:`science`},{id:50,emoji:`🌿`,text:`Fresh material vaporizes differently than cured material. Curing reduces chlorophyll and converts THCA to THC. Uncured material is legal to grow in many places and almost universally disappointing.`,tag:`science`},{id:51,emoji:`🌋`,text:`Storz & Bickel was founded in 1996 by Markus Storz in Tuttlingen, Germany — a city historically famous for producing surgical precision instruments. The precision DNA runs deep.`,tag:`history`},{id:52,emoji:`🏥`,text:`A 2000 study in the Journal of Cannabis Therapeutics confirmed the Volcano produced vapor with significantly lower toxic byproducts than combustion. It's been cited in medical contexts ever since.`,tag:`history`},{id:53,emoji:`🌐`,text:`Germany's BfArM (Federal Institute for Drugs and Medical Devices) certified the Volcano Medic as a medical device — one of the only vaporizers to receive official medical classification anywhere in the world.`,tag:`history`},{id:54,emoji:`🎛️`,text:`The Digit was released in 2007 partly because users were already manually calibrating Classic dials with external thermometers to get precise temperatures. The demand for precision was real and vocal.`,tag:`history`},{id:55,emoji:`🛸`,text:`The Volcano Hybrid was developed partly in response to users who were hacking their Classics with third-party Bluetooth temperature sensors. The company eventually caught up to its own community.`,tag:`history`},{id:56,emoji:`🎪`,text:`The original Volcano Classic mold has barely changed since 2000. The iconic shape isn't just design — the conical form creates stable, consistent airflow dynamics.`,tag:`history`},{id:57,emoji:`🎩`,text:`The Volcano Medic (medical-grade variant) is the same device with different packaging, certification documentation, and a 2-year medical warranty. The hardware is identical.`,tag:`history`},{id:58,emoji:`🏔️`,text:`Storz & Bickel spent years before release testing airflow, temperature consistency, and vapor safety. The Volcano shipped when it was ready — not when a funding round demanded it.`,tag:`history`},{id:59,emoji:`🧲`,text:`The magnetic valve coupling on the Hybrid was one of the most-requested features from Classic and Digit owners. Sometimes the best product feedback is "I'm tired of this specific thing."`,tag:`history`},{id:60,emoji:`🔢`,text:`The Easy Valve system was introduced to simplify the original Solid Valve, which required manual bag-cutting and more precise cleaning. It made the device significantly more accessible.`,tag:`history`},{id:61,emoji:`📡`,text:`The Storz & Bickel app launched alongside the Hybrid in 2019 and added session logging — making the Volcano one of the first vaporizers with built-in usage data tracking.`,tag:`history`},{id:62,emoji:`🌬️`,text:`Early Volcano prototypes reportedly took several design iterations to solve the bag-sealing problem without compromising airflow. The Easy Valve solution is now the industry reference.`,tag:`history`},{id:63,emoji:`🎓`,text:`The Volcano has been referenced in peer-reviewed medical literature more than any other consumer vaporizer. Its role in cannabis research is disproportionate to its sales volume.`,tag:`history`},{id:64,emoji:`🌋`,text:`Tuttlingen, where Storz & Bickel manufactures, produces roughly one-third of the world's surgical instruments. The Volcano shares supply chain heritage with orthopedic tools.`,tag:`history`},{id:65,emoji:`⏱️`,text:`The Volcano Hybrid's 40-second heat-up time is roughly 7x faster than the Classic. For context, a kettle takes about 2–3 minutes. The Hybrid is genuinely fast.`,tag:`history`},{id:66,emoji:`🏆`,text:`The Volcano Classic won the High Times Cannabis Cup for Best Vaporizer nine consecutive times. At some point they informally retired it from competition for being unfair.`,tag:`history`},{id:67,emoji:`🌿`,text:`The Volcano was among the first consumer devices to receive serious attention from harm-reduction researchers in the early 2000s. It helped establish a scientific framework for vaporizer evaluation.`,tag:`history`},{id:68,emoji:`🔧`,text:`Storz & Bickel offers repair services for Volcano units regardless of age. There are functioning Classics in use from the early 2000s. The devices are built to outlast their owners' enthusiasm.`,tag:`history`},{id:69,emoji:`📺`,text:`The Volcano Classic appeared in several documentary films about cannabis policy and harm reduction in the 2000s, usually as visual shorthand for "sophisticated user."`,tag:`history`},{id:70,emoji:`🌐`,text:`Germany legalized medical cannabis in 2017. The Volcano's medical certification — which predated this by over a decade — became significantly more commercially relevant overnight.`,tag:`history`},{id:71,emoji:`🎛️`,text:`The Volcano was released before widespread internet forums, so early user communities grew through word of mouth and print magazines. The reputation was built in smoke shops, not subreddits.`,tag:`history`},{id:72,emoji:`🛸`,text:`Storz & Bickel has never publicly confirmed the specific materials science behind the Easy Valve bag film. What is confirmed: it passes food safety standards. What it's made of: proprietary.`,tag:`history`},{id:73,emoji:`💎`,text:`The Volcano has maintained remarkably consistent pricing since launch relative to inflation. It has never been cheap, and Storz & Bickel has never competed on price.`,tag:`history`},{id:74,emoji:`🌋`,text:`No official Volcano advertising campaign has ever explicitly shown what's being vaporized. The entire brand identity rests entirely on the device and its engineering.`,tag:`history`},{id:75,emoji:`🏥`,text:`The first medical prescription for a Volcano-based vaporizer was reportedly issued in Canada in the early 2000s. The device was prescribed before it was mainstream.`,tag:`history`},{id:76,emoji:`🔭`,text:`Most Volcano design patents are held in Germany and the EU. The Classic design was aggressively protected — numerous competitors who designed similar shapes received legal correspondence.`,tag:`history`},{id:77,emoji:`🎪`,text:`Storz & Bickel launched a dry herb vaporizer called the Mighty in 2014, targeting portability. It uses the same engineering philosophy as the Volcano, reduced to a pocket-sized format.`,tag:`history`},{id:78,emoji:`🧪`,text:`The Volcano was evaluated in a Johns Hopkins University study on cannabinoid delivery efficiency. Its performance was the benchmark that all other devices were compared against.`,tag:`history`},{id:79,emoji:`📏`,text:`The Solid Valve system — the original, reusable bag setup — is still sold alongside the Easy Valve and remains the choice for users who prioritize zero plastic waste and long-term cost.`,tag:`history`},{id:80,emoji:`🌬️`,text:`The Volcano Classic has appeared in a surprising number of TV shows in the background of "sophisticated" or "tech-forward" characters' apartments. It has never once been the plot.`,tag:`history`},{id:81,emoji:`🔢`,text:`The Classic dial (1–9) maps roughly to 130–230°C. Each full number step is approximately 11°C. Dial 6 is roughly 196°C. The dial is analog precision.`,tag:`temp`},{id:82,emoji:`🌡️`,text:`Most experienced users eventually settle on a primary temperature and rarely change it. Then one day they try something new and their entire framework collapses.`,tag:`temp`},{id:83,emoji:`⚡`,text:`The 180–190°C range is where many flavor-focused users spend most of their time. The terpene profile is complete enough to be complex but hasn't yet started to degrade.`,tag:`temp`},{id:84,emoji:`🎯`,text:`Most people discover their ideal temperature range 10–20°C lower than their initial instinct. The instinct to go hotter is nearly universal. Going lower first is the move.`,tag:`temp`},{id:85,emoji:`🌡️`,text:`Dial 5.5 on the Classic is approximately 190°C — right at the edge between "flavor first" and "vapor first." Many users consider this the perfect dial position.`,tag:`temp`},{id:86,emoji:`💨`,text:`Going above 210°C produces noticeably denser vapor but also starts introducing more combustion byproducts. The trade-off is real, and it's a personal call every time.`,tag:`temp`},{id:87,emoji:`🌿`,text:`The 165–185°C range activates most of the flavor-active terpenes without fully exhausting cannabinoid content. Bag 1 at this range followed by Bag 2 at 195–205°C is a widely praised two-stage protocol.`,tag:`temp`},{id:88,emoji:`🔥`,text:`Actual combustion of flower starts around 230°C. The Volcano Hybrid's Superboost tops out at 230°C. The line between vaporization and combustion is technically within reach — but not recommended.`,tag:`temp`},{id:89,emoji:`🎚️`,text:`Somewhere, someone is currently adjusting their temperature by one degree and insisting it matters. We cannot confirm or deny whether it matters.`,tag:`temp`},{id:90,emoji:`🧠`,text:`Every Volcano owner eventually develops at least one completely unhinged opinion about the correct temperature. This is not a bug. This is the feature.`,tag:`temp`},{id:91,emoji:`📊`,text:`The 190–200°C range is statistically the most popular temperature for whole-flower vaporization based on user surveys and community data. It's popular for a reason. Try it if you haven't.`,tag:`temp`},{id:92,emoji:`🌡️`,text:`Starting at dial 4.5 and stepping upward by 0.5 each bag is a protocol used by some flavor-maximalist users to extract the complete terpene profile in sequence before anything burns.`,tag:`temp`},{id:93,emoji:`🔭`,text:`The Digit allows temperature setting in 1°C increments. This level of precision is legitimately useful for flavor comparison. It is also, objectively, a lot of opinions per degree.`,tag:`temp`},{id:94,emoji:`💡`,text:`Stepping up temperature between bags from the same load increases extraction efficiency. Each degree upward pulls compounds that the previous temperature couldn't reach.`,tag:`temp`},{id:95,emoji:`🌊`,text:`The 155–165°C range is technically functional for vaporization but produces very light vapor. It's worth trying once just to understand what your material's terpene top notes smell like on their own.`,tag:`temp`},{id:96,emoji:`🔢`,text:`You know who you are. You've run this exact temperature for two years. You've tried other settings exactly once. You came back. There is no judgment here.`,tag:`temp`},{id:97,emoji:`⚗️`,text:`A protocol starting at 170°C and stepping to 185°C, then 200°C has been described by multiple experienced users as producing the fullest flavor arc from a single chamber load.`,tag:`temp`},{id:98,emoji:`🌡️`,text:`190°C / dial 5.5 is often described as "set it and forget it" territory. It's where most users stop experimenting and start just enjoying. Which is also a valid form of optimization.`,tag:`temp`},{id:99,emoji:`🎯`,text:`Scientists call this exploration of temperature effects "fraction-specific terpene vaporization." Normal people call it "doing the thing until you find your thing."`,tag:`temp`},{id:100,emoji:`🌡️`,text:`Sometimes the answer is simply: daNggg.`,tag:`temp`},{id:101,emoji:`🔥`,text:`Dial 7.5 sits at approximately 213°C. This is not flavor territory. This is efficiency territory. Users who find their way here often don't need much convincing to stay.`,tag:`temp`},{id:102,emoji:`💨`,text:`The vapor at 200°C is visibly denser than at 180°C. The difference is immediately observable and impossible to unfeel. This is also why "just try 200 once" is common advice.`,tag:`temp`},{id:103,emoji:`🌿`,text:`Bag 3 from the same load at 210°C often produces a distinctly different effect profile than Bag 1 at 180°C from the same material. Same chamber. Different compounds. Same session.`,tag:`temp`},{id:104,emoji:`🧠`,text:`Temperature curiosity is one of the most consistent traits of long-term Volcano users. The ones who never adjust the dial exist, but they're quieter at parties.`,tag:`temp`},{id:105,emoji:`🌡️`,text:`Your future self genuinely appreciates you starting at a lower temperature. Your past self did not believe this. The cycle continues across sessions until it doesn't.`,tag:`temp`},{id:106,emoji:`🔬`,text:`At 195°C, you're in the overlap zone between major terpene expression and solid cannabinoid delivery. It's not accidental that this is where most users anchor.`,tag:`temp`},{id:107,emoji:`📡`,text:`The Hybrid's Bluetooth lets you set temperature to the single degree. The question of whether you can actually perceive a 1°C difference has been debated extensively. The debate is also the point.`,tag:`temp`},{id:108,emoji:`🌋`,text:`Dial 6 has claimed more hearts than any other position on the Classic. It sits at approximately 196°C. It is not dramatic. It is not flashy. It simply works.`,tag:`temp`},{id:109,emoji:`🎚️`,text:`The concept of a "session temperature" — one setting for the whole load — vs a "step protocol" — escalating temps across bags — divides Volcano users into two genuine philosophies.`,tag:`temp`},{id:110,emoji:`💡`,text:`Most experienced users keep a mental note of what dial position produced their best session of the year. This is not weird. This is the behavior the device was built to produce.`,tag:`temp`},{id:111,emoji:`🌋`,text:`Every Volcano owner has a favorite temperature and a backup favorite temperature. The second one exists for emergencies and very good days.`,tag:`lore`},{id:112,emoji:`🌋`,text:`The most common question among Volcano owners isn't "what temperature?" — it's "where did I put the mouthpiece?" This is universal. You are not alone.`,tag:`lore`},{id:113,emoji:`🌋`,text:`First session with a Volcano is a rite of passage. There is always a moment where you look at the bag filling and think: "oh. OH."`,tag:`lore`},{id:114,emoji:`🌋`,text:`Volcano owners who switch back to other methods usually come back. The device inspires a level of loyalty that would be embarrassing if the product didn't earn it.`,tag:`lore`},{id:115,emoji:`🌋`,text:`The Volcano has been described as "the espresso machine of vaporizers." Precision, ritual, strong opinions about the correct method, and contempt for shortcuts.`,tag:`lore`},{id:116,emoji:`🌋`,text:`A used Volcano in good condition holds its resale value extraordinarily well. Some people buy them used and never let go. The device doesn't have a natural end of life.`,tag:`lore`},{id:117,emoji:`🌋`,text:`There is a subset of Volcano owners who are quiet about it at first, mention it offhandedly, and then spend forty-five minutes explaining the bag system at the first opportunity.`,tag:`lore`},{id:118,emoji:`🌋`,text:`The Volcano is the type of device that makes you start caring about terpenes even if you didn't before. This is not accidental. This is what precision vaporization does to a person.`,tag:`lore`},{id:119,emoji:`🌋`,text:`Cleaning the Filling Chamber is one of those tasks that feels fussy until you skip it and notice the difference. Then it becomes ritual.`,tag:`lore`},{id:120,emoji:`🌋`,text:`The cleanest-tasting sessions often come from the most boring settings: fresh material, medium-coarse grind, dial 5.5, patient preheating, slow draws. Glamour is overrated.`,tag:`lore`},{id:121,emoji:`🌋`,text:`At least one person has gifted a Volcano to someone they love deeply. This is a known and documented form of affection.`,tag:`lore`},{id:122,emoji:`🌋`,text:`The ritual of setting up a Volcano session is part of the experience for most long-term users. The preparation is not overhead. It's the beginning.`,tag:`lore`},{id:123,emoji:`🌋`,text:`Volcano owners who switch to other devices consistently describe missing "the bag experience." The format is part of what makes it good.`,tag:`lore`},{id:124,emoji:`🌋`,text:`There is a correct way to load the chamber, and then there is the way you do it. At some point those two things become the same. This is experience.`,tag:`lore`},{id:125,emoji:`🌋`,text:`The moment someone tries a Volcano for the first time and says "oh this is different" is a rite of passage for the owner who introduced them.`,tag:`lore`},{id:126,emoji:`🌋`,text:`Volcano ownership comes with implied responsibilities: share it thoughtfully, clean it regularly, and never tell someone it's easy to use before showing them how it actually works.`,tag:`lore`},{id:127,emoji:`🌋`,text:`The Volcano doesn't care about trends. It didn't chase portable. It didn't chase electronic cigarette aesthetics. It stayed a volcano. This is also a life philosophy.`,tag:`lore`},{id:128,emoji:`🌋`,text:`The bag fills, and for a moment everything is slightly suspended. This is the part that doesn't translate to description.`,tag:`lore`},{id:129,emoji:`🌋`,text:`A fully-filled bag is legitimately satisfying to look at. This has been true since 2000 and will not change.`,tag:`lore`},{id:130,emoji:`🌋`,text:`There are Volcanos in use today that predate most social media platforms. The device has outlived more trends than its owners expected.`,tag:`lore`},{id:131,emoji:`👽`,text:`We have analyzed 7,142 human vaping rituals. Most involve overthinking, underfilling the chamber, and being surprised that Bag 1 is always weaker than expected.`,tag:`alien`},{id:132,emoji:`👽`,text:`Intergalactic Advisory: No alien civilization has officially endorsed any specific dial setting. However, several have noted that dial 6 produces "remarkably consistent results for a 25-year-old design."`,tag:`alien`},{id:133,emoji:`👽`,text:`The Volcano was flagged in our early survey of Earth technology as "simple, precise, and unlikely to require an update." This assessment has not changed in 25 years.`,tag:`alien`},{id:134,emoji:`👽`,text:`We cannot confirm whether the Volcano's convection design was inspired by extraterrestrial technology. Markus Storz has never denied it either.`,tag:`alien`},{id:135,emoji:`👽`,text:`Humans who read every single fact in this app are classified in our database as "highly curious, probably not sleeping yet." This classification is affectionate.`,tag:`alien`},{id:136,emoji:`👽`,text:`Our research indicates that the phrase "daNggg" is a legitimate scientific measurement. Units unknown. Effect: confirmed.`,tag:`alien`},{id:137,emoji:`👽`,text:`The alien emoji was chosen to represent curiosity, not invasion. Please recalibrate your assumptions. Also, preheat longer.`,tag:`alien`},{id:138,emoji:`👽`,text:`We have studied human temperature preference patterns for many years. You all say you like flavor. Then you turn up the dial. We find this charming.`,tag:`alien`},{id:139,emoji:`👽`,text:`Cross-referencing 900 sessions: the human who tries dial 7.5 for the first time and says nothing intelligible afterward is having the correct reaction.`,tag:`alien`},{id:140,emoji:`👽`,text:`This message has been approved by absolutely nobody. Use your own judgment. Or don't. It's a dial. There are only nine positions.`,tag:`alien`},{id:141,emoji:`👽`,text:`Many civilizations have developed vaporization technology. Very few have put it in a bag. This was unexpected. Also: ingenious.`,tag:`alien`},{id:142,emoji:`👽`,text:`We confirmed life on this planet partly through the signal produced by a functioning Volcano Hybrid. The heat-up speed was notable.`,tag:`alien`},{id:143,emoji:`👽`,text:`Some Volcano owners start with temperature curiosity and end up with something resembling a scientific practice. We find this very relatable.`,tag:`alien`},{id:144,emoji:`👽`,text:`If you are reading this at a temperature above 7.5 on the dial: our research indicates your judgment may be slightly impaired. We wish you nothing but well.`,tag:`alien`},{id:145,emoji:`👽`,text:`The concept of "one more bag" has been observed in 91.7% of tracked sessions. The other 8.3% exercised restraint that we have only witnessed in this context.`,tag:`alien`},{id:146,emoji:`🐸`,text:`If a frog could use a Volcano, it would probably insist on 185°F, call it "optimal pond temperature," and be insufferable about it.`,tag:`frog`},{id:147,emoji:`🐸`,text:`Frogs are excellent temperature detectors. Their skin absorbs environmental conditions and registers changes instantly. We don't have a good analog here. We just like frogs.`,tag:`frog`},{id:148,emoji:`🐸`,text:`Small hops count. This is true for frogs and true for temperature experimentation. You don't have to jump from 5 to 8 in one session.`,tag:`frog`},{id:149,emoji:`🐸`,text:`A frog in a pond is patient and observant. It doesn't rush. It waits for the right moment. It also doesn't eat Myrcene, but we support it anyway.`,tag:`frog`},{id:150,emoji:`🐸`,text:`Frogs vocalize primarily at night. This fact is only slightly related to the optimal hours for a long Volcano session. We trust you to make the connection.`,tag:`frog`},{id:151,emoji:`🐸`,text:`The poison dart frog is the most colorful amphibian. It signals its potency visually. Some cultivars do something similar. This may be the loosest analogy in this database.`,tag:`frog`},{id:152,emoji:`🐸`,text:`Hydrate. This is advice from both frogs and anyone who has spent significant time with a Volcano. These two sources rarely agree on things. Take note.`,tag:`frog`},{id:153,emoji:`🐸`,text:`Tree frogs can hold on to smooth surfaces through adhesion. This is unrelated to the Easy Valve mouthpiece, which also adheres satisfyingly. We notice things.`,tag:`frog`},{id:154,emoji:`🐸`,text:`Frogs have been on Earth for over 360 million years. The Volcano has been on Earth since 2000. In geological time, this is the same.`,tag:`frog`},{id:155,emoji:`🐸`,text:`Some frogs can survive being frozen solid and thawing out in spring. This level of resilience is aspirational. Also: the Volcano has a similar relationship with time.`,tag:`frog`},{id:156,emoji:`🐸`,text:`Frogs breathe through their skin. This fact has absolutely nothing to do with vaporization. We included it because it is genuinely interesting and you deserve good facts.`,tag:`frog`},{id:157,emoji:`🐸`,text:`The scientific term for the frog call is "advertisement call." Volcanoes do this too. They call to you. You know it when you hear it.`,tag:`frog`},{id:158,emoji:`🐸`,text:`We are not sure why frog became part of this app's lore. We are sure that it was correct. Small hops. Big results. Proceed accordingly.`,tag:`frog`},{id:159,emoji:`🍄`,text:`Fungi break down complex structures through enzymatic processes and release nutrients slowly over time. This is also loosely how the Volcano approaches a chamber load.`,tag:`mushroom`},{id:160,emoji:`🍄`,text:`The largest living organism on Earth is a fungal network in Oregon covering 2,385 acres. The Volcano's bag network, comparatively, covers the distance from your couch to the table.`,tag:`mushroom`},{id:161,emoji:`🍄`,text:`Mycelium transmits chemical signals across its network. Terpenes do something similar — they signal and carry information that changes your experience. This is a metaphor. Or science. Both.`,tag:`mushroom`},{id:162,emoji:`🍄`,text:`Forest floors smell the way they do largely because of fungal activity. Terpene release in vaporization smells the way it does for similar reasons. These facts are spiritually related.`,tag:`mushroom`},{id:163,emoji:`🍄`,text:`Some mushrooms are bioluminescent. This would be a useful feature for filling bags in the dark. Storz & Bickel has not yet addressed this.`,tag:`mushroom`},{id:164,emoji:`🍄`,text:`Mushrooms don't have a central nervous system, but they respond to their environment. The Volcano does the same — it responds to material quality, grind size, and your patience level.`,tag:`mushroom`},{id:165,emoji:`🍄`,text:`Foraging for the perfect cultivar to vaporize at the correct temperature is, in structure, identical to foraging for mushrooms. Patience, observation, knowing what you're looking at.`,tag:`mushroom`},{id:166,emoji:`🍄`,text:`The spore print of a mushroom — pressed onto paper to reveal its pattern — is a lot like the first bag of a new cultivar. It tells you everything about what follows.`,tag:`mushroom`},{id:167,emoji:`🍄`,text:`Mushrooms are the fruiting body of the mycelium. What you see is not the whole organism. Same is true of a good session — what you observe first is not the complete picture.`,tag:`mushroom`},{id:168,emoji:`🍄`,text:`Somewhere in Germany, an engineer is still quietly proud of the temperature curve they designed for the Volcano. This is the fungal kind of satisfaction: slow, structural, enduring.`,tag:`mushroom`},{id:169,emoji:`💭`,text:`Somewhere, someone is on their third Volcano. They haven't upgraded. The older ones work fine. This is the right attitude.`,tag:`community`},{id:170,emoji:`💭`,text:`The person who introduces someone to the Volcano for the first time remembers the exact moment it clicked. The person being introduced usually just says "whoa."`,tag:`community`},{id:171,emoji:`💭`,text:`There are Volcano users who have never read the manual and are convinced they're doing it correctly. Some of them are right.`,tag:`community`},{id:172,emoji:`💭`,text:`The consensus on forums about the "best temperature" is approximately 200 opinions divided across 6 temperature positions. Everyone is certain. Nobody agrees.`,tag:`community`},{id:173,emoji:`💭`,text:`At some point, you stop explaining how the bag works to new people and just hand it to them. This is wisdom.`,tag:`community`},{id:174,emoji:`💭`,text:`There is a Volcano owner somewhere who has never tried bag 2. They should. This message is for them, and they know who they are.`,tag:`community`},{id:175,emoji:`💭`,text:`The ABV drawer — where people save their spent material — is a collector's item that most Volcano owners maintain whether or not they ever use it. It just feels right to keep.`,tag:`community`},{id:176,emoji:`💭`,text:`Cleaning day for the Volcano chamber feels like maintenance on something that matters. Because it is.`,tag:`community`},{id:177,emoji:`💭`,text:`The number of people who started temperature-curious and ended up reading about terpenes at midnight is, we estimate, most of you.`,tag:`community`},{id:178,emoji:`💭`,text:`The hardest thing about introducing someone to the Volcano for the first time is pretending you don't know exactly what's about to happen when they inhale.`,tag:`community`},{id:179,emoji:`👽`,text:`🛸 RARE TRANSMISSION: If you are reading this, you have reached fact 179. Our records indicate you have been very curious tonight. Carry on.`,tag:`rare`},{id:180,emoji:`🐸`,text:`🐸 POND DISPATCH: If you're reading every fact in this app, you are definitely the type of person who reads instruction manuals. We mean this as the highest possible compliment.`,tag:`rare`},{id:181,emoji:`🌋`,text:`🌋 VOLCANIC BULLETIN: Dial 7.5. daNggg. These two facts are connected. No further explanation required.`,tag:`rare`},{id:182,emoji:`🐶`,text:`🐶 UNVERIFIED FIELD REPORT: A goldendoodle named Harvey has been observed napping peacefully near multiple Volcano sessions. Correlation with specific dial settings: under investigation. We remain optimistic.`,tag:`rare`},{id:183,emoji:`🍄`,text:`🍄 DEEP FOREST NOTE: The most frequent thought during a well-executed Volcano session is not "I should optimize this." It's "oh, yeah." This is progress.`,tag:`rare`},{id:184,emoji:`👽`,text:`🛸 INTERGALACTIC HERBALIST CERTIFICATION: You have demonstrated sufficient curiosity. This is not a real certification. But if it were, you'd have it.`,tag:`rare`},{id:185,emoji:`🌋`,text:`🌋 FOUNDER'S EDITION NOTE: Markus Storz designed this to last. You using this app to learn about it is exactly the kind of thing he'd quietly approve of.`,tag:`rare`},{id:186,emoji:`🐸`,text:`🐸 AMPHIBIAN INTELLIGENCE REPORT: We have confirmed that frogs do not have preferences about temperature dials. We have confirmed that you probably do. This asymmetry is notable.`,tag:`rare`},{id:187,emoji:`🍄`,text:`🍄 FOREST WIZARD'S LOG: You've been here a while. The mushrooms respect this. The volcano appreciates it. So does the person who built this app.`,tag:`rare`},{id:188,emoji:`👽`,text:`🛸 CLASSIFIED: This is fact 188 of 200. The irony of discovering secrets through persistence rather than shortcuts is not lost on us.`,tag:`rare`},{id:189,emoji:`💭`,text:`The first person to read all 200 facts in this app has not yet existed. But they will. And when they do, they'll deserve something. We're working on it.`,tag:`rare`},{id:190,emoji:`🌋`,text:`This app was built by someone who genuinely thinks the Volcano is excellent, the temperature guide is underused, and weird facts deserve a dedicated button. Priorities in order.`,tag:`rare`},{id:191,emoji:`👽`,text:`daNggg is not in the dictionary. It should be. Informal noun: the involuntary verbal response to a well-executed high-temperature bag. Usage: universal.`,tag:`rare`},{id:192,emoji:`🐸`,text:`The frog did not ask to be in this app. The frog would have agreed immediately if asked. We know this because frogs are unbothered and curious. So is this app.`,tag:`rare`},{id:193,emoji:`🍄`,text:`Somewhere between "this is for reference" and "I've read all 200 facts" is the Volcano companion sweet spot. You're in it. Welcome.`,tag:`rare`},{id:194,emoji:`👽`,text:`We asked several engineers why the Classic dial goes to 9 and not 10. Nobody gave a satisfying answer. This mystery has been filed under: acceptable.`,tag:`rare`},{id:195,emoji:`🌋`,text:`The Volcano has outlasted several technologies it was invented alongside. It outlasted the MiniDisc. The HD-DVD. Several social networks. Most trends. It just works.`,tag:`rare`},{id:196,emoji:`🐸`,text:`Fact 196. You are a person of deep curiosity and considerable patience. The frog salutes you. So do we.`,tag:`rare`},{id:197,emoji:`🍄`,text:`Every session is a data point. Every bag is an iteration. Every temperature adjustment is a hypothesis. You're doing science. It just happens to be enjoyable science.`,tag:`rare`},{id:198,emoji:`👽`,text:`You have now read more weird Volcano facts than most people own Volcanos. This says something about your character. We're not sure what. But it's positive.`,tag:`rare`},{id:199,emoji:`🌋`,text:`There are 200 facts in this database. You're one away from the end. The next fact is the last one. No pressure. You've already found it by getting this far.`,tag:`rare`},{id:200,emoji:`🎖️`,text:`🎖️ COLLECTOR'S EDITION: You found them all. 200 facts. The Volcano gods are genuinely pleased. The frogs are celebrating quietly. The aliens have updated your file. Well done.`,tag:`rare`}],se=`👽 Scanning for intelligent vapor life…(🐸 Frog calibration complete.(🍄 Spore sensors online.(🌋 Warming up the mountain…(👽 Humans detected. Curiosity levels: high.(🐸 Pond conditions optimal.(🍄 Forest wizardry loading.(🌋 Checking volcanic stability.(👽 Interstellar quality assurance complete.(🐸 Ribbit if you're ready.(🌋 Preheating. Please wait patiently.(👽 Temperature protocols initialized.(🐸 Small hops. Big results.(🍄 Mycelium network engaged.(🌋 Hot air rising. In a g  at higher temps.`}],E=[{n:1,emoji:`⚙️`,title:`Grind`,sublabel:`Prep the payload`,detail:`Medium-coarse — like rough sea salt. Not powder-fine (chokes airflow), not chunky (uneven heat). A 4-piece grinder is ideal. 0.1–0.3g fills the chamber comfortably.`,tip:`Fill the chamber loosely. Don't pack it. The Volcano is convection — hot air pushes through. It needs room to breathe.`},{n:2,emoji:`🌋`,title:`Load the Chamber`,sublabel:`Dock the eruption core`,detail:`Unscrew the orange cap on the Filling Chamber. Add material. Replace the cap. Screw onto the valve system (Classic) or dock magnetically (Hybrid). Don't overfill past the orange line.`,tip:`The orange line is not decorative. Above it = compromised airflow = weak bags. The line has earned your respect.`},{n:3,emoji:`🌡️`,title:`Set Your Dial`,sublabel:`Choose your altitude`,detail:`Classic: rotate the dial. Digit/Hybrid: use the display or app. First timers: start at 5.5–6. Let it fully preheat — the indicator light or screen confirms when it's ready.`,tip:`Wait 2–3 extra minutes after the ready signal. A truly saturated heating element makes Bag 1 dramatically better. This is the most skipped step. Don't skip it.`},{n:4,emoji:`💛`,title:`Attach the Bag`,sublabel:`Mount the vapor collector`,detail:`Press the Easy Valve bag onto the mouthpiece nozzle until it clicks. Dock the assembled valve + bag on top of the unit. The click matters — a loose bag vents vapor.`,tip:`Easy Valve bags last 50–100 sessions before quality noticeably drops. Solid Valve bags are indefinitely reusable with ISO cleaning.`},{n:5,emoji:`🫧`,title:`Fill the Bag`,sublabel:`🌋 Prime Eruption Conditions`,detail:`Press the green Air button. Watch the bag fill — 30–60 seconds for a standard bag. Stop at 80–90% full. Overfilling = rapid condensation = wasted vapor.`,tip:`Thin or wispy first bag? The chamber needs more time. Let it heat one more minute and refill. The first bag is always the unit finding its groove.`},{n:6,emoji:`😮‍💨`,title:`Detach & Inhale`,sublabel:`🛸 Vapor Payload Ready`,detail:`Squeeze the mouthpiece and pull the bag free. Inhale slow and steady — 5–7 seconds per draw is optimal. The Volcano rewards patience. Fast puffs waste vapor.`,tip:`One full bag = roughly 6–10 draws. Slow inhalation increases lung absorption significantly. This is not the same as a bong hit. Different technique, different experience.`},{n:7,emoji:`🔄`,title:`Second Bag`,sublabel:`Extract the remainder`,detail:`Re-attach a fresh bag. Bump the dial up 0.5–1 notch for Bag 2. The material is warmed and partially extracted — higher temp reaches remaining compounds. Most chambers yield 2–3 bags.`,tip:`Spent herb (ABV) turns tan/brown with a nutty smell. It's already decarboxylated by the Volcano's heat — fully usable for edibles. Save it. It deserves a second life.`}],D=[{name:`Classic`,year:`2000`,control:`Analog dial`,heatup:`~5 min`,price:`~$480`,icon:`🔘`,vibe:`Bombproof simplicity. The original. The legend.`,color:`#6b7280`,pros:[`Insanely durable`,`Nothing digital to fail`,`Easiest to service`,`Instant status icon`],cons:[`No precise temp readout`,`Slowest heat-up`,`No app`]},{name:`Digit`,year:`2007`,control:`Digital display`,heatup:`~4 min`,price:`~$530`,icon:`🔢`,vibe:`Classic plus the ability to know exactly what temperature you're judging.`,color:`#3b82f6`,pros:[`Exact °F/°C readout`,`Auto-shutoff`,`Proven reliability`],cons:[`No app connectivity`,`No superboost`,`Older design`]},{name:`Hybrid`,year:`2019`,control:`Digital + Bluetooth`,heatup:`~40 sec`,price:`~$700`,icon:`📱`,vibe:`Full tech stack. 40 seconds. Someone wanted the app and Storz & Bickel delivered.`,color:`#8b5cf6`,pros:[`40-second heat-up`,`Bluetooth app control`,`Whip + bag modes`,`Superboost to 230°C`,`USB-C port`],cons:[`Most expensive`,`More components to maintain`,`Overkill if app isn't important to you`]}];function ge({dialValue:e}){let t=e=>e*Math.PI/180,n=220-260*((e-1)/8),r=80+55*Math.cos(t(n)),i=80-55*Math.sin(t(n)),a=(e,n,r)=>{let i=t(e),a=t(
